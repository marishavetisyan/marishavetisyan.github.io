<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Դարպասի հաշվիչ</title>

<style>
img {
  border-radius: 19%;
  border-bottom: 6px solid #ff7a00;
  box-shadow: 0 -1px 20px rgba(0,0,0,0.08);
}
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 80px;
}

#logo {
    text-align: center;
}

@media (max-width: 550px) {
    .container {
        flex-direction: column;
        gap: 30px;
    }

    #logo {
        order: -1;      /* logo on top */
    }

    .card {
        max-width: 500px;
        background: #fff;
        padding: 22px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        border-top: 6px solid #ff7a00;
        position: relative;
    }
}
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #fff7f2;
  color: #222;
}

.container {
  display: flex;
  gap: 40px;
  padding: 60px 10%;
  align-items: center;
}

.container h1 {
  font-size: 42px;
  margin: 0;
}

.container p {
  color: #666;
  margin-top: 10px;
}

.card {
  width: 90%;
  min-width: 207px;
  background: #fff;
  padding: 22px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  border-top: 6px solid #ff7a00;
  position: relative;
  
}

.row {
  display: flex;
  gap: 30px;
}

label {
  font-size: 20px;
}

input {
  width: 60px;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 20px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #ff7a00;
  color: white;
  cursor: pointer;
  font-size: 20px;
}

.result {
  margin-top: 14px;
  font-size: 20px;
  line-height: 1.7;
  padding-bottom: 60px;
}

/* PRICE/M² BADGE */
.sqm-badge {
  position: absolute;
  bottom: 14px;
  right: 14px;
  background: rgba(255, 122, 0, 0.95);
  color: white;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 19px;
  font-weight: 600;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

/* SECTIONS */
.section {
  padding: 60px 10%;
}
</style>
</head>

<body>

<div class="container">
  <div id="logo">
    <img style="width:170px;" src="https://scontent.fevn15-1.fna.fbcdn.net/v/t39.30808-6/305578590_561645995789487_6168990027862965789_n.png?stp=dst-png&cstp=mx1736x1736&ctp=s1736x1736&_nc_cat=107&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=lBAPU_LLLbMQ7kNvwGwUtNQ&_nc_oc=AdpK6PstYcpJ694lQKuj4GlnF49MjAXfF5kkfdkxQQbyGlrUUFSFa0RHAOUXPLnD9O0&_nc_zt=23&_nc_ht=scontent.fevn15-1.fna&_nc_gid=Xp_6cmo9VJheqoLCu1lvpg&_nc_ss=7b2a8&oh=00_Af_Z2W5_qsEEZHRZn7CRpWEzICtWqTGtzN8cgHfz6D9xCQ&oe=6A45A97D">
    <p>Հաշվիր քո դարպասի արժեքը 30 վայրկյանում</p>
  </div>
  <div class="card">

      <div class="row">
          <label>Լայնություն (մ) 
            <input value="3.2" id="w" type="number" step="0.1" min="2" max="6" inputmode="decimal">
          </label>
          <label>Բարձրություն (մ)
            <input value="2.5" id="h" type="number" step="0.1" min="1.5" max="4" inputmode="decimal">
          </label>
      </div>

    <div style="margin-top:10px;">
      <label style="display:inline-flex; align-items:center; gap:6px;">
        Հեռակառավարում -
        <input type="checkbox" id="auto" checked style="transform: scale(1.5);">
      </label>
    </div>

    <div style="margin-top:10px; ">
      <label style="display:inline-flex; align-items:center; gap:6px; white-space:nowrap;">
        Դռնակ / կալիտկա -
        <input type="checkbox" id="door" style="transform: scale(1.5);">
      </label>
    </div>

    <div style="margin-top:10px;">
      <label style="display:inline-flex; align-items:center; gap:6px; white-space:nowrap;">
        Տեղադրում -
        <input type="checkbox" id="install" style="transform: scale(1.5);">
      </label>
    </div>

    <button onclick="calc()">Հաշվել</button>

    <div class="result" id="res"></div>

  </div>

</div>

<script>

const products = [
  { w: 3.2, price: 600000 },
  { w: 3.7, price: 660000 },
  { w: 4.2, price: 760000 },
  { w: 4.5, price: 793000 }
];
const stdh = 2.5;

function calc() {

  const w = parseFloat(document.getElementById("w").value);
  const h = parseFloat(document.getElementById("h").value);

  const auto = document.getElementById("auto").checked;
  const door = document.getElementById("door").checked;
  const install = document.getElementById("install").checked;

  let wSelected = products.find(p => p.w === w);
  let hSelected = stdh === h;
  let wMatched = !!wSelected;
  let hMatched = !!hSelected;
  let assembly = 0;

// validating complects with standard widths and height
  if (!wSelected) {
    wSelected = products.find(p => p.w >= w);
    if (!wSelected) {
      document.getElementById("res").innerHTML =
        "Տվյալ լայնության համար անհրաժեշտ է անհատական հաշվարկ";
      return;
    } else {
      assembly = 50000;
    }
  }

  let lines = [];
  let complect = wSelected.price;
  let total = complect;

// remote 
  const sqm = w * h;
  if (!auto) {
    const motorPrice = (sqm <= 10) ? 147000 : 160000;
    total -= motorPrice;
    lines.push(`● Կոմպլեկտ (5 սեկցիա) - ${(complect-motorPrice).toLocaleString()}&nbsp;AMD`);
  } else {
    lines.push(`● Կոմպլեկտ (5 սեկցիա) - ${(complect).toLocaleString()}&nbsp;AMD`);
  }

// height
  let panelHeight = 0.5;
  let panelPrice = 90000;
  if (!hSelected) {
    let panelsCount = h/panelHeight;
    let panelsDifference = panelsCount - 5;
    
    if (panelsDifference>2||panelsDifference<-1) {
      document.getElementById("res").innerHTML =
        "Տվյալ բարձրության համար անհրաժեշտ է անհատական հաշվարկ";
      return;
    } else {
      total+= Math.ceil(panelsDifference)*panelPrice * w / 6;
      if(Math.ceil(panelsDifference) !== 0) {
        lines.push(`● Լրացուցիչ սեկցիա <br>
          ${Math.ceil(panelsDifference)} հատ ${w} մետր պանել - 
          ${parseInt(Math.ceil(panelsDifference) * panelPrice * w / 6)}&nbsp;AMD
          `);
      }
      // cuts
      if(Math.ceil(panelsDifference) === panelsDifference) {
      } else {
          //horizontal cuts
          assembly += 50000;
      }
      //vertical cuts
      if(panelsDifference>0)
      assembly += Math.ceil(panelsDifference)*10000;
    }
  }

  let passingDoor = 200000;
//assembly
  if (wMatched&&hMatched) {
  } else {
    total += assembly;
    if(assembly)lines.push("● Կտրում - " + assembly/1000 + ",000&nbsp;AMD");
  }

    if (door) {
    total += passingDoor;
    lines.push("● Դռնակ / կալիտկա - 200,000&nbsp;AMD");
  }
//installation
  if (install) {
    total+= 150000;
    lines.push("● Տեղադրում - 150,000&nbsp;AMD");
  } 

  // sqm price
  const sqmPrice = Math.round(total / sqm);

  const badge = `
    <div class="sqm-badge">
      ${sqmPrice.toLocaleString()} AMD / մ²
    </div>
  `;

  let html = `
    <div style="margin-bottom:10px;font-weight:bold;color:#ff7a00;">
      Արժեքը՝ <br>
    </div>
  `;

  html += lines.map(l => `<div>${l}</div>`).join("");
  html += ` <div style="margin-bottom:10px;font-weight:bold;color:#ff7a00;">
  Ընդհանուր - ${total.toLocaleString()} AMD
  </div>`;
  html += badge;

  document.getElementById("res").innerHTML = html;
}

</script>

</body>
</html>
